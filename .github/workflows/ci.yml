name: Run Tests

on:
  push:
    branches: [ main, master, dev, develop ]
  pull_request:
    branches: [ main, master, dev, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: baorongvang_test
          POSTGRES_PASSWORD: postgres_ci_password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        # Wait for postgres to be ready before starting job steps
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all test suites
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci
          TEST_DATABASE_URL: postgresql://postgres:postgres_ci_password@localhost:5432/baorongvang_test
          DATABASE_URL: postgresql://postgres:postgres_ci_password@localhost:5432/baorongvang_test
        run: npm test
